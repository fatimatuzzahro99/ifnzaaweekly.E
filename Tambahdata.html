<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Data | Informatika</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        h2 {
            text-align: center;
        }

        .container {
            width: 400px;
            margin: 30px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        table {
            margin: auto;
        }

        td {
            padding: 8px;
        }

        input {
            padding: 5px;
            width: 200px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }

        .back {
            text-align: center;
            margin-top: 15px;
        }

        a {
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Tambah Data Mahasiswa</h2>

        <form action="mahasiswa.html" method="post">

            <table>
                <tr>
                    <td><label for="nama">Nama</label></td>
                    <td>:</td>
                    <td><input type="text" name="nama" id="nama" /></td>
                </tr>

                <tr>
                    <td><label for="foto">Foto</label></td>
                    <td>:</td>
                    <td><input type="file" name="foto" id="foto" /></td>
                </tr>

                <tr>
                    <td><label for="uts">UTS</label></td>
                    <td>:</td>
                    <td><input type="number" name="uts" id="uts" /></td>
                </tr>

                <tr>
                    <td><label for="uas">UAS</label></td>
                    <td>:</td>
                    <td><input type="number" name="uas" id="uas" /></td>
                </tr>

                <tr>
                    <td><label for="tugas">Tugas</label></td>
                    <td>:</td>
                    <td><input type="number" name="tugas" id="tugas" /></td>
                </tr>

                <tr>
                    <td colspan="3">
                        <button type="submit" name="submit">
                            Tambah
                        </button>
                    </td>
                </tr>
            </table>

        </form>

        <div class="back">
            <a href="mahasiswa.html">Back</a>
        </div>

    </div>

</body>
</html>
